name: Build Sarwar Smart PCMS x86
on:
  workflow_dispatch:
  push:
    tags: ['v*']
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2
      - name: Restore
        run: dotnet restore src/SarwarSmartPCMS.csproj
      - name: Build x86 Release
        run: dotnet build src/SarwarSmartPCMS.csproj -c Release -p:Platform=x86
      - name: Locate packed XLL
        shell: powershell
        run: |
          Get-ChildItem -Recurse src\bin\Release | Format-Table FullName
      - name: Install Inno Setup
        run: choco install innosetup -y
      - name: Build installer
        shell: cmd
        run: '"C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\SarwarSmartPCMS.iss'
      - uses: actions/upload-artifact@v4
        with:
          name: Sarwar-Smart-PCMS-x86
          path: |
            installer/Output/*.exe
            src/bin/Release/**/*.xll
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/*.exe
