name: Build Sarwar Smart PCMS x86

on:
  workflow_dispatch:

  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build 32-bit Excel Add-in
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2
        with:
          nuget-version: latest

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Verify required files
        shell: powershell
        run: |
          $requiredFiles = @(
            "src/SarwarSmartPCMS.csproj",
            "src/SarwarSmartPCMS.dna",
            "installer/SarwarSmartPCMS.iss"
          )

          foreach ($file in $requiredFiles) {
            if (-not (Test-Path $file)) {
              throw "Required file is missing: $file"
            }

            Write-Host "Found: $file"
          }

      - name: Restore NuGet packages
        shell: powershell
        run: |
          nuget restore "src/SarwarSmartPCMS.csproj" `
            -NonInteractive

          if ($LASTEXITCODE -ne 0) {
            Write-Host "NuGet restore using nuget.exe was not applicable."
            Write-Host "Running MSBuild restore instead."

            msbuild "src/SarwarSmartPCMS.csproj" `
              /t:Restore `
              /p:Configuration=Release `
              /p:Platform=x86
          }

      - name: Clean previous build
        shell: powershell
        run: |
          if (Test-Path "src/bin") {
            Remove-Item "src/bin" -Recurse -Force
          }

          if (Test-Path "src/obj") {
            Remove-Item "src/obj" -Recurse -Force
          }

          Write-Host "Previous build folders removed."

      - name: Build with full MSBuild
        shell: powershell
        run: |
          msbuild "src/SarwarSmartPCMS.csproj" `
            /t:Restore,Rebuild `
            /p:Configuration=Release `
            /p:Platform=x86 `
            /p:PlatformTarget=x86 `
            /p:Prefer32Bit=true `
            /p:DebugSymbols=false `
            /p:DebugType=None `
            /p:ExcelDnaCreate32BitAddIn=true `
            /p:ExcelDnaCreate64BitAddIn=false `
            /p:RunExcelDnaPack=true `
            /m `
            /verbosity:normal

          if ($LASTEXITCODE -ne 0) {
            throw "MSBuild failed."
          }

      - name: Display generated files
        shell: powershell
        run: |
          Write-Host "Generated Excel-DNA files:"

          Get-ChildItem `
            -Path "src/bin/Release" `
            -Recurse `
            -File |
            Select-Object FullName, Length |
            Format-Table -AutoSize

      - name: Locate 32-bit packed XLL
        shell: powershell
        run: |
          $xllFiles = Get-ChildItem `
            -Path "src/bin/Release" `
            -Recurse `
            -File `
            -Filter "*.xll"

          Write-Host "All generated XLL files:"

          $xllFiles |
            Select-Object FullName, Length |
            Format-Table -AutoSize

          $packedXll = $xllFiles |
            Where-Object {
              $_.Name -match "packed" -and
              $_.Name -notmatch "64"
            } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $packedXll) {
            throw "No 32-bit packed XLL was generated."
          }

          $publishFolder = "src/bin/Release/net48/publish"

          New-Item `
            -ItemType Directory `
            -Path $publishFolder `
            -Force |
            Out-Null

          $destinationXll =
            Join-Path `
              $publishFolder `
              "SarwarSmartPCMS-AddIn-packed.xll"

          if ($packedXll.FullName -ne
              (Join-Path (Resolve-Path $publishFolder) "SarwarSmartPCMS-AddIn-packed.xll")) {
            Copy-Item `
              -Path $packedXll.FullName `
              -Destination $destinationXll `
              -Force
          }

          Write-Host "Selected XLL:"
          Write-Host $packedXll.FullName

          Write-Host "Staged XLL:"
          Write-Host $destinationXll

          if (-not (Test-Path $destinationXll)) {
            throw "The packed XLL could not be staged."
          }

      - name: Install Inno Setup
        shell: powershell
        run: |
          choco install innosetup `
            --yes `
            --no-progress

          if ($LASTEXITCODE -ne 0) {
            throw "Inno Setup installation failed."
          }

      - name: Build Windows installer
        shell: powershell
        run: |
          $possiblePaths = @(
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe"
          )

          $iscc = $possiblePaths |
            Where-Object { Test-Path $_ } |
            Select-Object -First 1

          if (-not $iscc) {
            throw "Inno Setup compiler was not found."
          }

          Write-Host "Using:"
          Write-Host $iscc

          & $iscc "installer/SarwarSmartPCMS.iss"

          if ($LASTEXITCODE -ne 0) {
            throw "Installer compilation failed."
          }

      - name: Verify installer
        shell: powershell
        run: |
          $installer = Get-ChildItem `
            -Path "installer/Output" `
            -Filter "*.exe" `
            -File `
            -ErrorAction SilentlyContinue |
            Select-Object -First 1

          if (-not $installer) {
            throw "No installer EXE was generated."
          }

          Write-Host "Installer created successfully:"
          Write-Host $installer.FullName
          Write-Host "Installer size: $($installer.Length) bytes"

      - name: Upload installer and add-in
        uses: actions/upload-artifact@v4
        with:
          name: Sarwar-Smart-PCMS-x86
          if-no-files-found: error
          retention-days: 30
          path: |
            installer/Output/*.exe
            src/bin/Release/**/*.xll
            src/bin/Release/**/*.dll
            src/bin/Release/**/*.dna
            README.md
            docs/**

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            installer/Output/*.exe
